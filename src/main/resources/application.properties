# Postgres and Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://localhost:5432/db_investimentos
spring.datasource.username=postgres
spring.datasource.password=root123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Application Health
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
spring.application.name=agregador-de-investimentos
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo:4318/v1/traces

# JWT
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-muito-segura-123}

# Brapi Token
BRAPI_TOKEN=BRAPI_TOKEN
