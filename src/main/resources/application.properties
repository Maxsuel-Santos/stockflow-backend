# ===================================================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_investimentos
spring.datasource.username=postgres
spring.datasource.password=root123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / Hibernate
# ===================================================================
//spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# STORAGE CONFIGURATION (MinIO / S3)
# ===================================================================
aws.s3.endpoint=http://minio:9000
aws.s3.access-key=admin
aws.s3.secret-key=password123
aws.s3.bucket-name=user-avatars
aws.s3.region=us-east-1

# ===================================================================
# SECURITY & JWT
# ===================================================================
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-muito-segura-123}

# ===================================================================
# EXTERNAL APIS (Brapi)
# ===================================================================
BRAPI_TOKEN=BRAPI_TOKEN

# ===================================================================
# OBSERVABILITY & MONITORING (Actuator, Prometheus, Grafana)
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ===================================================================
# Tracing (Tempo / OpenTelemetry)
# ===================================================================
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ===================================================================
# DOCUMENTATION (Swagger / OpenAPI)
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=true

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ===================================================================
# DATABASE MIGRATIONS (Flyway)
# ===================================================================
# Altere ddl-auto para 'validate' ou 'none' para o Flyway assumir o controle
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
